---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: rewrite-images-to-harbor
  annotations:
    policies.kyverno.io/title: Rewrite Images to Harbor
    policies.kyverno.io/description: >-
      Rewrites container image registry prefixes to route pulls through Harbor proxy caches.
      Mirrors docker.io, ghcr.io, quay.io, and mirror.gcr.io.
spec:
  rules:
    - name: replace-docker-io
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            preconditions:
              all:
                - key: "{{ regex_match('^docker\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^docker\\.io/(goharbor|coredns)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^docker\\.io', element.image, 'harbor.garb.dev/docker.io') }}"
          - list: "request.object.spec.initContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^docker\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^docker\\.io/(goharbor|coredns)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                initContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^docker\\.io', element.image, 'harbor.garb.dev/docker.io') }}"
          - list: "request.object.spec.ephemeralContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^docker\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^docker\\.io/(goharbor|coredns)/', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^docker\\.io', element.image, 'harbor.garb.dev/docker.io') }}"

    - name: replace-ghcr-io
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            preconditions:
              all:
                - key: "{{ regex_match('^ghcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^ghcr\\.io/(cloudnative-pg/)?(cloudnative-pg|postgresql|plugin-barman*):.*$', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^ghcr\\.io', element.image, 'harbor.garb.dev/ghcr.io') }}"
          - list: "request.object.spec.initContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^ghcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^ghcr\\.io/(cloudnative-pg/)?(cloudnative-pg|postgresql|plugin-barman*):.*$', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                initContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^ghcr\\.io', element.image, 'harbor.garb.dev/ghcr.io') }}"
          - list: "request.object.spec.ephemeralContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^ghcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^ghcr\\.io/(cloudnative-pg/)?(cloudnative-pg|postgresql|plugin-barman*):.*$', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^ghcr\\.io', element.image, 'harbor.garb.dev/ghcr.io') }}"

    - name: replace-quay-io
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            preconditions:
              all:
                - key: "{{ regex_match('^quay\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^quay\\.io/cilium[/-]', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^quay\\.io', element.image, 'harbor.garb.dev/quay.io') }}"
          - list: "request.object.spec.initContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^quay\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^quay\\.io/cilium[/-]', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                initContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^quay\\.io', element.image, 'harbor.garb.dev/quay.io') }}"
          - list: "request.object.spec.ephemeralContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^quay\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
                - key: "{{ regex_match('^quay\\.io/cilium[/-]', element.image) }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^quay\\.io', element.image, 'harbor.garb.dev/quay.io') }}"

    - name: replace-mirror-gcr-io
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations:
                - CREATE
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            preconditions:
              all:
                - key: "{{ regex_match('^mirror\\.gcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^mirror\\.gcr\\.io', element.image, 'harbor.garb.dev/mirror.gcr.io') }}"
          - list: "request.object.spec.initContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^mirror\\.gcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
            patchStrategicMerge:
              spec:
                initContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^mirror\\.gcr\\.io', element.image, 'harbor.garb.dev/mirror.gcr.io') }}"
          - list: "request.object.spec.ephemeralContainers"
            preconditions:
              all:
                - key: "{{ regex_match('^mirror\\.gcr\\.io', element.image) }}"
                  operator: Equals
                  value: "true"
            patchStrategicMerge:
              spec:
                ephemeralContainers:
                  - name: "{{ element.name }}"
                    image: "{{ regex_replace_all('^mirror\\.gcr\\.io', element.image, 'harbor.garb.dev/mirror.gcr.io') }}"
