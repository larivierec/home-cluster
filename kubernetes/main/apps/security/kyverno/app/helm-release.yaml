---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: security
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: 3.8.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    config:
      excludeKyvernoNamespace: false
    backgroundController:
      enabled: false
    cleanupController:
      enabled: false
    reportsController:
      enabled: false
    features:
      admissionReports:
        enabled: false
      aggregateReports:
        enabled: false
      policyReports:
        enabled: false
      validatingAdmissionPolicyReports:
        enabled: false
