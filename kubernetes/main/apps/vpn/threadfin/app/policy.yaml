---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: threadfin-vpn
  namespace: vpn
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: threadfin
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: gateway
    - toEntities:
        - cluster
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "34400"
              protocol: TCP
