---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vpn
resources:
  - ./external-secret.yaml
  - ./helm-release.yaml
  - ./policy.yaml
configMapGenerator:
  - name: vpn-gateway-dnsdist
    files:
      - ./config/dnsdist.yml
generatorOptions:
  disableNameSuffixHash: true
